name: Check Upstream Parser
on:
  # schedule:
  #   - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get Latest Tag
        id: tag
        run: |
          TAG=$(curl -s "https://api.github.com/repos/c3lang/tree-sitter-c3/releases/latest" | jq -r .tag_name)
          if [ "$TAG" == "null" ] || [ -z "$TAG" ]; then
            # Fallback to the latest tag if releases aren't used correctly
            TAG=$(curl -s "https://api.github.com/repos/c3lang/tree-sitter-c3/tags" | jq -r '.[0].name')
          fi
          echo "latest=$TAG" >> $GITHUB_OUTPUT

      - name: Update Version and Queries
        run: |
          LATEST="${{ steps.tag.outputs.latest }}"
          chmod +x ./scripts/update_queries.sh
          ./scripts/update_queries.sh "$LATEST"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: update tree-sitter parser to ${{ steps.tag.outputs.latest }}" || echo "No changes to commit"
          git push

